<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Rands Wallet | Digital Tickets</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111217;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .wallet-header {
            max-width: 1300px;
            margin: 0 auto 2rem;
            text-align: center;
        }

        .wallet-header h1 {
            font-size: 32px;
            color: #dc2626;
            margin-bottom: 8px;
        }

        .wallet-header p {
            color: #888;
            font-size: 14px;
        }

        .section-title {
            max-width: 1300px;
            margin: 2rem auto 1rem;
            font-size: 24px;
            font-weight: 700;
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .events-container, .wallet-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }

        /* Event card (holds 3 ticket cards inside) */
        .event-card {
            background: #1a1c24;
            border-radius: 32px;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .event-header {
            padding: 1.2rem 1.5rem;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
        }

        .event-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .event-header .event-date {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .ticket-types {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ticket-type-card {
            background: #0f1117;
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid rgba(220, 38, 38, 0.2);
            transition: all 0.2s;
        }

        .ticket-type-card:hover {
            border-color: #dc2626;
            background: #13161f;
        }

        .ticket-type-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .ticket-type-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #dc2626;
        }

        .ticket-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd966;
        }

        .ticket-availability {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 12px;
        }

        .wallet-add-btn {
            width: 100%;
            padding: 10px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .wallet-add-btn:hover {
            background: #b91c1c;
            transform: scale(0.98);
        }

        .wallet-add-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* Wallet ticket card */
        .wallet-ticket {
            background: #0f1117;
            border-radius: 28px;
            overflow: hidden;
            width: 320px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            transition: 0.2s;
        }

        .wallet-ticket-header {
            background: linear-gradient(135deg, #1a1c24, #0a0c12);
            padding: 1rem;
            border-bottom: 1px solid #dc2626;
        }

        .wallet-ticket-header h3 {
            font-size: 1.2rem;
            color: #dc2626;
        }

        .wallet-ticket-body {
            padding: 1rem;
        }

        .wallet-ticket-body .qr-area {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        .wallet-ticket-body canvas {
            width: 120px;
            height: 120px;
            background: white;
            padding: 6px;
            border-radius: 16px;
        }

        .wallet-info {
            font-size: 0.8rem;
            margin: 8px 0;
            color: #ccc;
        }

        .remove-ticket-btn {
            background: #6b7280;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .remove-ticket-btn:hover {
            background: #4b5563;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: #1a1c24;
            border-radius: 30px;
            color: #888;
            width: 100%;
        }

        .empty-state i {
            font-size: 60px;
            color: #dc2626;
            margin-bottom: 15px;
        }

        .info-note {
            max-width: 1300px;
            margin: 2rem auto 0;
            background: #1a1c24;
            padding: 1rem;
            border-radius: 60px;
            color: #b9c3db;
            font-size: 0.8rem;
            text-align: center;
        }

        .toggle-wallet {
            background: #2d2f3a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 700px) {
            .event-card, .wallet-ticket { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>

<div class="wallet-header">
    <h1><i class="fas fa-wallet"></i> Rands Wallet</h1>
    <p>Your digital tickets – add, store, and scan at the gate</p>
</div>

<div style="max-width: 1300px; margin: 0 auto; text-align: right;">
    <button class="toggle-wallet" id="toggleWalletBtn"><i class="fas fa-ticket-alt"></i> Show My Tickets</button>
</div>

<!-- Events section -->
<div class="section-title"><i class="fas fa-calendar-alt"></i> Available Events</div>
<div id="eventsContainer" class="events-container">
    <div class="empty-state">Loading events...</div>
</div>

<!-- Wallet section (hidden initially) -->
<div id="walletSection" style="display: none;">
    <div class="section-title"><i class="fas fa-ticket-alt"></i> My Tickets</div>
    <div id="walletContainer" class="wallet-container"></div>
</div>

<div class="info-note">
    <i class="fas fa-qrcode"></i> Each ticket has a unique QR code. Present it at the venue for scanning.<br>
    Tickets are stored in your browser's local wallet.
</div>

<script>
    // ========== STORAGE KEYS ==========
    const EVENTS_KEY = 'rands_events';
    const WALLET_KEY = 'wallet_tickets';

    // Helper functions
    function loadEventsFromStorage() {
        const stored = localStorage.getItem(EVENTS_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function saveWallet(wallet) {
        localStorage.setItem(WALLET_KEY, JSON.stringify(wallet));
    }

    function loadWallet() {
        const stored = localStorage.getItem(WALLET_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    // Generate unique ticket ID
    function generateTicketId(eventId, ticketType) {
        return `TKT-${eventId}-${ticketType}-${Date.now()}-${Math.random().toString(36).substr(2, 8)}`;
    }

    // Add ticket to wallet
    function addToWallet(event, ticketTypeKey) {
        const ticketTypes = event.ticketTypes;
        const ticket = ticketTypes[ticketTypeKey];
        
        // Check availability
        const remaining = ticket.capacity - ticket.sold;
        if (remaining <= 0) {
            alert(`Sorry, ${ticketTypeKey === 'earlyBird' ? 'Early Bird' : ticketTypeKey === 'general' ? 'General Admission' : 'VIP'} tickets are sold out.`);
            return;
        }

        const typeName = {
            earlyBird: 'Early Bird',
            general: 'General Admission',
            vip: 'VIP Experience'
        }[ticketTypeKey];

        const ticketId = generateTicketId(event.id, ticketTypeKey);
        const payload = {
            ticketId: ticketId,
            eventId: event.id,
            eventName: event.name,
            eventDate: event.date,
            eventTime: event.time,
            location: event.location,
            ticketType: typeName,
            ticketTypeKey: ticketTypeKey,
            price: ticket.price,
            addedAt: new Date().toISOString()
        };

        const wallet = loadWallet();
        // Check if already have same event+type? Allow multiple, but we'll allow duplicates (user can add multiple)
        wallet.push(payload);
        saveWallet(wallet);
        
        alert(`✅ Added 1 x "${typeName}" ticket for "${event.name}" to your wallet.`);
        renderWallet();  // refresh wallet view
        // Also re-render events to update remaining capacities (optional but good)
        renderEvents();
    }

    // Remove ticket from wallet
    function removeFromWallet(index) {
        const wallet = loadWallet();
        if (index >= 0 && index < wallet.length) {
            wallet.splice(index, 1);
            saveWallet(wallet);
            renderWallet();
            renderEvents(); // to update availability displays if needed
        }
    }

    // Render all active/upcoming events with ticket cards
    function renderEvents() {
        const container = document.getElementById('eventsContainer');
        let events = loadEventsFromStorage();
        // Filter only active or upcoming (not ended)
        events = events.filter(e => e.status !== 'ended');
        
        if (events.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>No Active Events</h3><p>Check back later or create events in the Event Manager.</p></div>`;
            return;
        }

        container.innerHTML = events.map(event => {
            const ticketTypes = event.ticketTypes;
            const ticketTypeKeys = ['earlyBird', 'general', 'vip'];
            const typeLabels = { earlyBird: '🎟️ Early Bird', general: '👥 General Admission', vip: '👑 VIP Experience' };
            
            const ticketCards = ticketTypeKeys.map(key => {
                const t = ticketTypes[key];
                const remaining = t.capacity - t.sold;
                const soldOut = remaining <= 0;
                return `
                    <div class="ticket-type-card">
                        <div class="ticket-type-header">
                            <span class="ticket-type-name">${typeLabels[key]}</span>
                            <span class="ticket-price">R ${formatPrice(t.price)}</span>
                        </div>
                        <div class="ticket-availability">
                            ${t.sold} / ${t.capacity} sold • ${remaining} remaining
                        </div>
                        <button class="wallet-add-btn" onclick="addToWallet(${JSON.stringify(event).replace(/"/g, '&quot;')}, '${key}')" ${soldOut ? 'disabled' : ''}>
                            <i class="fas fa-plus-circle"></i> Add to Wallet
                        </button>
                    </div>
                `;
            }).join('');
            
            return `
                <div class="event-card">
                    <div class="event-header">
                        <h2>${escapeHtml(event.name)}</h2>
                        <div class="event-date"><i class="fas fa-calendar-alt"></i> ${formatDate(event.date)} at ${event.time}</div>
                        <div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}</div>
                    </div>
                    <div class="ticket-types">
                        ${ticketCards}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Render wallet tickets with QR codes
    function renderWallet() {
        const wallet = loadWallet();
        const container = document.getElementById('walletContainer');
        
        if (wallet.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><h3>No Tickets Yet</h3><p>Add tickets from the events above.</p></div>`;
            return;
        }
        
        container.innerHTML = wallet.map((ticket, idx) => {
            // Create a unique DOM id for QR canvas
            const qrId = `qr-wallet-${idx}`;
            // Build payload for QR code
            const qrPayload = JSON.stringify({
                ticketId: ticket.ticketId,
                eventName: ticket.eventName,
                eventDate: ticket.eventDate,
                eventTime: ticket.eventTime,
                venue: ticket.location,
                ticketType: ticket.ticketType,
                price: ticket.price,
                issued: ticket.addedAt,
                validator: "RANDS_WALLET"
            });
            
            // We'll generate QR after DOM insertion
            setTimeout(() => {
                const canvas = document.getElementById(qrId);
                if (canvas && typeof QRCode !== 'undefined') {
                    QRCode.toCanvas(canvas, qrPayload, {
                        width: 120,
                        margin: 1,
                        color: { dark: '#dc2626', light: '#FFFFFF' }
                    }, (err) => { if (err) console.error(err); });
                }
            }, 50);
            
            return `
                <div class="wallet-ticket">
                    <div class="wallet-ticket-header">
                        <h3>${escapeHtml(ticket.eventName)}</h3>
                    </div>
                    <div class="wallet-ticket-body">
                        <div class="qr-area">
                            <canvas id="${qrId}" width="120" height="120"></canvas>
                        </div>
                        <div class="wallet-info"><strong>${escapeHtml(ticket.ticketType)}</strong> • R ${formatPrice(ticket.price)}</div>
                        <div class="wallet-info"><i class="fas fa-calendar"></i> ${formatDate(ticket.eventDate)} at ${ticket.eventTime}</div>
                        <div class="wallet-info"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(ticket.location)}</div>
                        <div class="wallet-info"><small>ID: ${ticket.ticketId.substring(0, 16)}...</small></div>
                        <button class="remove-ticket-btn" onclick="removeFromWallet(${idx})"><i class="fas fa-trash-alt"></i> Remove</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Toggle wallet visibility
    let walletVisible = false;
    function toggleWallet() {
        const section = document.getElementById('walletSection');
        const btn = document.getElementById('toggleWalletBtn');
        walletVisible = !walletVisible;
        section.style.display = walletVisible ? 'block' : 'none';
        btn.innerHTML = walletVisible ? '<i class="fas fa-eye-slash"></i> Hide My Tickets' : '<i class="fas fa-ticket-alt"></i> Show My Tickets';
        if (walletVisible) renderWallet();
    }

    // Format helpers
    function formatDate(dateString) {
        if (!dateString) return '';
        return new Date(dateString).toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
    }
    function formatPrice(price) {
        return price.toLocaleString('en-ZA', { minimumFractionDigits: 2 });
    }
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Listen for storage changes (if event manager updates events)
    window.addEventListener('storage', (e) => {
        if (e.key === EVENTS_KEY) {
            renderEvents();
            if (walletVisible) renderWallet();
        }
    });

    // Initial render
    renderEvents();
    document.getElementById('toggleWalletBtn').addEventListener('click', toggleWallet);
    
    // Expose functions globally for inline onclick
    window.addToWallet = addToWallet;
    window.removeFromWallet = removeFromWallet;
</script>
</body>
</html>
