<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rands Wallet | My Events & Tickets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #f4f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .app-container { max-width: 500px; width: 100%; margin: 0 auto; background: #ffffff; border-radius: 40px; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08); overflow: hidden; position: relative; }
        
        /* Header */
        .app-header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #eff3f8; }
        .logo h1 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #E30613, #9f0110); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-icons { display: flex; gap: 12px; }
        .header-icon { width: 40px; height: 40px; background: #f7f9fd; border-radius: 30px; display: inline-flex; align-items: center; justify-content: center; color: #E30613; font-size: 1.1rem; cursor: pointer; }
        .header-icon:active { transform: scale(0.94); }
        
        .welcome-banner { background: linear-gradient(135deg, #E30613, #b0020e); margin: 16px 20px; padding: 20px; border-radius: 28px; color: white; }
        .welcome-text { font-size: 0.8rem; opacity: 0.9; }
        .customer-name { font-size: 1.3rem; font-weight: 700; margin-top: 4px; }
        .balance-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 16px; }
        .balance-label { font-size: 0.7rem; opacity: 0.8; }
        .balance-amount { font-size: 1.8rem; font-weight: 800; }
        .top-up-btn { background: rgba(255,255,255,0.2); border: none; padding: 6px 14px; border-radius: 40px; color: white; font-size: 0.7rem; cursor: pointer; }
        
        .app-main { height: auto; max-height: 75vh; overflow-y: auto; scroll-behavior: smooth; padding-bottom: 8px; }
        
        /* Tab Bar */
        .tab-bar { display: flex; background: white; border-bottom: 1px solid #eff3f8; padding: 0 20px; gap: 20px; }
        .tab { text-align: center; padding: 14px 0; font-weight: 600; font-size: 0.85rem; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; flex: 1; }
        .tab.active { color: #E30613; border-bottom-color: #E30613; }
        .tab-panel { display: none; padding: 16px 0 24px; }
        .tab-panel.active { display: block; animation: fadeSlide 0.2s ease; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Event Cards */
        .event-card { background: white; border-radius: 24px; margin: 12px 16px; overflow: hidden; border: 1px solid #eef2f8; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .event-banner { height: 120px; background: linear-gradient(135deg, #E30613, #9f0110); display: flex; align-items: center; justify-content: center; color: white; font-size: 2.5rem; position: relative; }
        .event-banner.event-dark { background: linear-gradient(135deg, #1a1a2e, #16213e); }
        .event-banner i { filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3)); }
        .event-info { padding: 16px; }
        .event-title { font-size: 1.1rem; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
        .event-date, .event-location { font-size: 0.7rem; color: #64748b; margin: 4px 0; display: flex; align-items: center; gap: 6px; }
        .ticket-types { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .ticket-type-btn { background: #fef2f2; border: none; padding: 8px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: #E30613; cursor: pointer; transition: 0.1s; display: flex; align-items: center; gap: 6px; }
        .ticket-type-btn:active { transform: scale(0.96); }
        .ticket-type-btn.sold-out { opacity: 0.5; cursor: not-allowed; background: #e2e8f0; color: #64748b; }
        
        /* ========== PLAIN RED TICKET CARD ========== */
        .my-ticket-card {
            background: white;
            border-radius: 20px;
            margin: 12px 16px;
            padding: 0;
            overflow: hidden;
            border: 1px solid #E30613;
            box-shadow: 0 4px 12px rgba(227,6,19,0.12);
            position: relative;
        }
        
        /* Red ticket header with icon */
        .ticket-red-header {
            background: #E30613;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .ticket-red-header i {
            font-size: 1.6rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        .ticket-red-header .ticket-event-name {
            font-weight: 700;
            font-size: 1rem;
            margin: 0;
            color: white;
            flex: 1;
        }
        
        /* Ticket body */
        .ticket-body {
            padding: 16px;
            background: white;
        }
        
        .ticket-details-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 8px 0;
            font-size: 0.75rem;
            color: #334155;
        }
        .ticket-details-row i {
            width: 18px;
            color: #E30613;
        }
        
        .ticket-qr-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed #e2e8f0;
        }
        
        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 8px;
        }
        .ticket-btn {
            background: #E30613;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }
        .ticket-btn-secondary {
            background: #f1f5f9;
            color: #E30613;
            border: 1px solid #E30613;
        }
        .ticket-btn:active { transform: scale(0.97); }
        
        /* Ticket perforation effect (optional) */
        .my-ticket-card::before {
            content: "";
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            height: 2px;
            background: repeating-linear-gradient(90deg, #fff, #fff 8px, #E30613 8px, #E30613 16px);
            pointer-events: none;
        }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
        
        /* Modal styles */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; z-index: 3000; }
        .modal.active { display: flex; }
        .modal-card { background: white; width: 100%; max-width: 480px; border-radius: 28px 28px 0 0; padding: 24px 20px 28px; }
        .amount-chips { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; justify-content: center; }
        .amount-chip { background: #f1f5f9; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; border: 1px solid #e2e8f0; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 60px; font-weight: 600; border: none; cursor: pointer; }
        .btn-confirm { background: #E30613; color: white; }
        .btn-cancel { background: #f1f5f9; color: #2c3e66; }
        .form-input { width: 100%; padding: 12px; border-radius: 30px; border: 1px solid #e2e8f0; margin: 10px 0; }
        
        .toast-msg { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #1e2a3a; color: white; padding: 12px 20px; border-radius: 60px; text-align: center; z-index: 3500; display: none; font-size: 0.8rem; }
        .toast-msg.show { display: block; animation: fadeUp 0.2s; }
        @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        
        .bottom-tab-bar { position: sticky; bottom: 0; background: white; border-top: 1px solid #edf2f8; padding: 8px 16px 20px; display: flex; justify-content: space-around; }
        .bottom-tab { text-align: center; cursor: pointer; padding: 4px 0; border-radius: 40px; flex: 1; }
        .bottom-tab .icon { font-size: 1.3rem; color: #94a3b8; }
        .bottom-tab .label { font-size: 0.6rem; color: #7e8b9f; margin-top: 2px; }
        .bottom-tab.active .icon, .bottom-tab.active .label { color: #E30613; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header -->
    <div class="app-header">
        <div class="logo"><h1>Rands Wallet</h1></div>
        <div class="header-icons">
            <span class="header-icon" id="profileIcon"><i class="fas fa-user-circle"></i></span>
            <span class="header-icon" id="notifyIcon"><i class="fas fa-bell"></i></span>
        </div>
    </div>
    
    <!-- Welcome Banner with Balance -->
    <div class="welcome-banner">
        <div class="welcome-text">Welcome back,</div>
        <div class="customer-name" id="customerName">Mziwonke KaBuyaphi</div>
        <div class="balance-row">
            <div><span class="balance-label">Wallet Balance</span><br><span class="balance-amount" id="walletBalance">R 2,500.00</span></div>
            <button class="top-up-btn" id="topUpBtn"><i class="fas fa-plus-circle"></i> Top Up</button>
        </div>
    </div>
    
    <!-- Tab Navigation -->
    <div class="tab-bar">
        <div class="tab active" data-tab="events">🎟️ Events</div>
        <div class="tab" data-tab="mytickets">🎫 My Tickets</div>
    </div>
    
    <div class="app-main">
        <!-- Events Panel -->
        <div id="eventsPanel" class="tab-panel active">
            <div id="eventsListContainer"></div>
        </div>
        
        <!-- My Tickets Panel -->
        <div id="myticketsPanel" class="tab-panel">
            <div id="myTicketsContainer"></div>
        </div>
    </div>
    
    <!-- Bottom Tab Bar -->
    <div class="bottom-tab-bar">
        <div class="bottom-tab active" data-tab="events"><div class="icon"><i class="fas fa-calendar-alt"></i></div><div class="label">Events</div></div>
        <div class="bottom-tab" data-tab="mytickets"><div class="icon"><i class="fas fa-ticket-alt"></i></div><div class="label">My Tickets</div></div>
        <div class="bottom-tab" data-tab="support"><div class="icon"><i class="fas fa-headset"></i></div><div class="label">Support</div></div>
    </div>
    
    <!-- Top Up Modal -->
    <div id="topUpModal" class="modal">
        <div class="modal-card">
            <h3 style="color:#E30613;"><i class="fas fa-wallet"></i> Top Up Wallet</h3>
            <div class="amount-chips">
                <div class="amount-chip" data-amount="100">R100</div>
                <div class="amount-chip" data-amount="250">R250</div>
                <div class="amount-chip" data-amount="500">R500</div>
                <div class="amount-chip" data-amount="1000">R1000</div>
            </div>
            <input type="number" id="customAmount" class="form-input" placeholder="Custom amount (R)">
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" id="closeTopUpBtn">Cancel</button>
                <button class="modal-btn btn-confirm" id="confirmTopUpBtn">Add Funds</button>
            </div>
        </div>
    </div>
    
    <div id="globalToast" class="toast-msg"></div>
</div>

<script>
    // ========== STORAGE KEYS ==========
    const EVENTS_STORAGE_KEY = 'rands_events_v2';
    const TICKETS_STORAGE_KEY = 'user_tickets_v2';
    const WALLET_KEY = 'customer_wallet_balance';
    const CUSTOMER_KEY = 'current_customer';
    
    let events = [];
    let myTickets = [];
    let walletBalance = 2500.00;
    let currentCustomer = { id: "CUST_001", name: "Mziwonke KaBuyaphi", phone: "0635713652", email: "mziwonke@rands.co.za" };
    
    function showToast(msg) { 
        let t = document.getElementById('globalToast'); 
        t.innerText = msg; 
        t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 2200); 
    }
    
    function saveEvents() { localStorage.setItem(EVENTS_STORAGE_KEY, JSON.stringify(events)); }
    function saveTickets() { localStorage.setItem(TICKETS_STORAGE_KEY, JSON.stringify(myTickets)); }
    function saveWallet() { localStorage.setItem(WALLET_KEY, walletBalance.toFixed(2)); }
    
    function loadData() {
        const storedEvents = localStorage.getItem(EVENTS_STORAGE_KEY);
        if (storedEvents && storedEvents.length > 2) {
            events = JSON.parse(storedEvents);
        } else {
            events = [
                { id: "evt_1", name: "RANDS Summer Fest 2026", date: "2026-12-15", time: "18:00", location: "Cape Town Stadium", description: "Biggest music festival", ticketTypes: [{ type: "Early Bird", price: 299, capacity: 200, sold: 45 }, { type: "General", price: 450, capacity: 800, sold: 210 }, { type: "VIP", price: 1200, capacity: 100, sold: 12 }] },
                { id: "evt_2", name: "Neptune Rave", date: "2026-11-28", time: "20:00", location: "Zone 6 Venue, Soweto", description: "Electronic music night", ticketTypes: [{ type: "Early Bird", price: 150, capacity: 300, sold: 180 }, { type: "General", price: 250, capacity: 600, sold: 320 }, { type: "VIP", price: 500, capacity: 80, sold: 25 }] },
                { id: "evt_3", name: "Amapiano Kings", date: "2026-12-05", time: "19:00", location: "Ticketpro Dome, JHB", description: "Best Amapiano artists", ticketTypes: [{ type: "General", price: 350, capacity: 1000, sold: 450 }, { type: "VIP", price: 800, capacity: 150, sold: 40 }] }
            ];
            saveEvents();
        }
        
        const storedTickets = localStorage.getItem(TICKETS_STORAGE_KEY);
        if (storedTickets) myTickets = JSON.parse(storedTickets);
        else myTickets = [];
        
        const storedBalance = localStorage.getItem(WALLET_KEY);
        if (storedBalance) walletBalance = parseFloat(storedBalance);
        else walletBalance = 2500.00;
        
        const storedCustomer = localStorage.getItem(CUSTOMER_KEY);
        if (storedCustomer) currentCustomer = JSON.parse(storedCustomer);
        
        updateBalanceDisplay();
        document.getElementById('customerName').innerText = currentCustomer.name.split(' ')[0];
    }
    
    function updateBalanceDisplay() {
        document.getElementById('walletBalance').innerHTML = `R ${walletBalance.toLocaleString('en-ZA', { minimumFractionDigits: 2 })}`;
    }
    
    function renderEvents() {
        const container = document.getElementById('eventsListContainer');
        if (!events.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><p>No events available right now.</p></div>`;
            return;
        }
        
        const now = new Date();
        const upcoming = events.filter(e => new Date(e.date) >= now || e.date >= new Date().toISOString().split('T')[0]);
        
        if (upcoming.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-hourglass-end"></i><p>No upcoming events at the moment</p></div>`;
            return;
        }
        
        container.innerHTML = upcoming.map(event => {
            const ticketButtons = event.ticketTypes.map(tt => {
                const remaining = tt.capacity - tt.sold;
                const soldOut = remaining <= 0;
                return `<button class="ticket-type-btn ${soldOut ? 'sold-out' : ''}" 
                            onclick="${soldOut ? '' : `purchaseTicket('${event.id}', '${tt.type}', ${tt.price})`}"
                            ${soldOut ? 'disabled' : ''}>
                            <i class="fas fa-ticket-alt"></i> ${tt.type} • R${tt.price.toLocaleString()} 
                            ${soldOut ? '(Sold Out)' : `(${remaining} left)`}
                        </button>`;
            }).join('');
            
            return `
                <div class="event-card">
                    <div class="event-banner">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="event-info">
                        <div class="event-title">${escapeHtml(event.name)}</div>
                        <div class="event-date"><i class="far fa-calendar-alt"></i> ${formatDate(event.date)} at ${event.time}</div>
                        <div class="event-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}</div>
                        <div class="ticket-types">${ticketButtons}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // ========== PLAIN RED TICKET CARD WITH RED ICON ==========
    function renderMyTickets() {
        const container = document.getElementById('myTicketsContainer');
        if (!myTickets.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><p>You haven't purchased any tickets yet.<br>Go to Events tab to buy tickets!</p></div>`;
            return;
        }
        
        container.innerHTML = myTickets.map(ticket => {
            return `
                <div class="my-ticket-card" id="ticket-${ticket.id}">
                    <div class="ticket-red-header">
                        <i class="fas fa-ticket-alt"></i>
                        <div class="ticket-event-name">${escapeHtml(ticket.eventName)}</div>
                    </div>
                    <div class="ticket-body">
                        <div class="ticket-details-row">
                            <span><i class="far fa-calendar"></i> ${formatDate(ticket.eventDate)} at ${ticket.eventTime}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(ticket.eventLocation)}</span>
                        </div>
                        <div class="ticket-details-row">
                            <span><i class="fas fa-tag"></i> ${ticket.ticketType}</span>
                            <span><i class="fas fa-hashtag"></i> ${ticket.quantity} ticket(s)</span>
                            <span><i class="fas fa-rand"></i> R${ticket.totalPaid.toLocaleString()}</span>
                        </div>
                        <div class="ticket-qr-section">
                            <div id="qr-${ticket.id}" style="width:70px; height:70px;"></div>
                            <div style="font-size:0.6rem; color:#64748b; text-align:right;">
                                <i class="fas fa-qrcode"></i> Scan for entry<br>
                                ID: ${ticket.id.slice(-8)}
                            </div>
                        </div>
                        <div class="ticket-actions">
                            <button class="ticket-btn" onclick="downloadTicketPDF('${ticket.id}')"><i class="fas fa-download"></i> Download</button>
                            <button class="ticket-btn ticket-btn-secondary" onclick="shareTicket('${ticket.id}')"><i class="fab fa-whatsapp"></i> Share</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        // Generate QR codes
        myTickets.forEach(ticket => {
            const qrDiv = document.getElementById(`qr-${ticket.id}`);
            if (qrDiv && typeof QRCode !== 'undefined') {
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, {
                    text: `${ticket.eventName}|${ticket.ticketType}|${ticket.id}|${ticket.seatCode}`,
                    width: 70,
                    height: 70,
                    colorDark: "#E30613"
                });
            }
        });
    }
    
    function purchaseTicket(eventId, ticketType, price) {
        const event = events.find(e => e.id === eventId);
        if (!event) { showToast("Event not found"); return; }
        
        const tt = event.ticketTypes.find(t => t.type === ticketType);
        if (!tt) { showToast("Ticket type not available"); return; }
        
        const remaining = tt.capacity - tt.sold;
        if (remaining <= 0) { showToast("Sorry, this ticket type is sold out!"); return; }
        
        showQuantityModal(event, tt, price);
    }
    
    function showQuantityModal(event, ticketTypeObj, price) {
        const modal = document.createElement('div');
        modal.className = 'modal active';
        modal.innerHTML = `
            <div class="modal-card">
                <h3 style="color:#E30613;"><i class="fas fa-ticket-alt"></i> ${escapeHtml(event.name)}</h3>
                <p style="margin:10px 0;">Ticket: <strong>${ticketTypeObj.type}</strong><br>Price: R${price.toLocaleString()}</p>
                <p>Quantity: 
                    <input type="number" id="ticketQty" min="1" max="${ticketTypeObj.capacity - ticketTypeObj.sold}" value="1" style="width:80px; padding:8px; border-radius:16px; border:1px solid #ccc; margin-left:8px;">
                </p>
                <p style="margin-top:12px;">Total: <strong id="totalAmount">R${price.toLocaleString()}</strong></p>
                <p style="font-size:0.7rem; margin-top:8px;">💰 Your balance: R${walletBalance.toLocaleString()}</p>
                <div class="modal-btns">
                    <button class="modal-btn btn-cancel" id="cancelPurchaseBtn">Cancel</button>
                    <button class="modal-btn btn-confirm" id="confirmPurchaseBtn">Confirm Purchase</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const qtyInput = modal.querySelector('#ticketQty');
        const totalSpan = modal.querySelector('#totalAmount');
        
        qtyInput.addEventListener('input', () => {
            let qty = parseInt(qtyInput.value) || 1;
            if (qty < 1) qty = 1;
            if (qty > (ticketTypeObj.capacity - ticketTypeObj.sold)) qty = ticketTypeObj.capacity - ticketTypeObj.sold;
            qtyInput.value = qty;
            totalSpan.innerText = `R${(qty * price).toLocaleString()}`;
        });
        
        modal.querySelector('#confirmPurchaseBtn').onclick = () => {
            const qty = parseInt(qtyInput.value) || 1;
            const total = qty * price;
            
            if (walletBalance < total) {
                showToast(`Insufficient balance! Need R${total.toLocaleString()}. Please top up.`);
                modal.remove();
                return;
            }
            
            walletBalance -= total;
            saveWallet();
            updateBalanceDisplay();
            
            const eventIndex = events.findIndex(e => e.id === event.id);
            const ttIndex = events[eventIndex].ticketTypes.findIndex(t => t.type === ticketTypeObj.type);
            events[eventIndex].ticketTypes[ttIndex].sold += qty;
            saveEvents();
            
            const newTicket = {
                id: 'tkt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                eventId: event.id,
                eventName: event.name,
                eventDate: event.date,
                eventTime: event.time,
                eventLocation: event.location,
                ticketType: ticketTypeObj.type,
                quantity: qty,
                pricePerTicket: price,
                totalPaid: total,
                seatCode: `${ticketTypeObj.type.substring(0,2).toUpperCase()}${Math.floor(Math.random()*1000)}`,
                purchaseDate: new Date().toISOString()
            };
            myTickets.push(newTicket);
            saveTickets();
            
            showToast(`✅ Success! Purchased ${qty}x ${ticketTypeObj.type} ticket(s).`);
            modal.remove();
            renderEvents();
            renderMyTickets();
        };
        
        modal.querySelector('#cancelPurchaseBtn').onclick = () => modal.remove();
    }
    
    window.downloadTicketPDF = async function(ticketId) {
        const ticket = myTickets.find(t => t.id === ticketId);
        if (!ticket) { showToast("Ticket not found"); return; }
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFillColor(227, 6, 19);
        doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("RANDS WALLET", 20, 22);
        
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(16);
        doc.text("EVENT TICKET", 20, 55);
        
        doc.setFontSize(11);
        doc.setTextColor(50, 50, 50);
        doc.text(`Event: ${ticket.eventName}`, 20, 80);
        doc.text(`Date: ${formatDate(ticket.eventDate)} at ${ticket.eventTime}`, 20, 95);
        doc.text(`Venue: ${ticket.eventLocation}`, 20, 110);
        doc.text(`Ticket Type: ${ticket.ticketType}`, 20, 125);
        doc.text(`Quantity: ${ticket.quantity}`, 20, 140);
        doc.text(`Total Paid: R${ticket.totalPaid.toLocaleString()}`, 20, 155);
        doc.text(`Ticket ID: ${ticket.id}`, 20, 170);
        doc.text(`Entry Code: ${ticket.seatCode}`, 20, 185);
        
        doc.setDrawColor(227, 6, 19);
        doc.setLineWidth(0.8);
        doc.rect(15, 45, 180, 155);
        
        doc.setFontSize(8);
        doc.setTextColor(100, 100, 100);
        doc.text("Scan QR code at venue entrance", 20, 215);
        doc.text("Powered by Rands Wallet", 150, 270);
        
        doc.save(`${ticket.eventName.replace(/\s/g, '_')}_Ticket.pdf`);
        showToast("Ticket PDF downloaded!");
    };
    
    window.shareTicket = function(ticketId) {
        const ticket = myTickets.find(t => t.id === ticketId);
        if (ticket) {
            const shareText = `🎫 MY TICKET\n\nEvent: ${ticket.eventName}\n📅 ${formatDate(ticket.eventDate)} at ${ticket.eventTime}\n📍 ${ticket.eventLocation}\n🎟️ ${ticket.ticketType} x${ticket.quantity}\n💰 Paid: R${ticket.totalPaid.toLocaleString()}`;
            if (navigator.share) {
                navigator.share({ title: 'My Event Ticket', text: shareText });
            } else {
                navigator.clipboard.writeText(shareText);
                showToast("Ticket details copied to clipboard!");
            }
        }
    };
    
    function topUpWallet(amount) {
        if (isNaN(amount) || amount <= 0) {
            showToast("Please enter a valid amount");
            return;
        }
        walletBalance += amount;
        saveWallet();
        updateBalanceDisplay();
        showToast(`✅ R${amount.toLocaleString()} added to your wallet!`);
        document.getElementById('topUpModal').classList.remove('active');
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return '';
        return new Date(dateStr).toLocaleDateString('en-ZA', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function switchTab(tabId) {
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.bottom-tab').forEach(bt => bt.classList.remove('active'));
        
        document.getElementById(`${tabId}Panel`).classList.add('active');
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        document.querySelector(`.bottom-tab[data-tab="${tabId}"]`).classList.add('active');
        
        if (tabId === 'mytickets') renderMyTickets();
        if (tabId === 'events') renderEvents();
        if (tabId === 'support') showToast("Contact support: support@rands.co.za | +27 63 571 3652");
    }
    
    function init() {
        loadData();
        renderEvents();
        renderMyTickets();
        
        document.querySelectorAll('.tab, .bottom-tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });
        
        document.getElementById('topUpBtn').addEventListener('click', () => {
            document.getElementById('topUpModal').classList.add('active');
        });
        document.getElementById('closeTopUpBtn').addEventListener('click', () => {
            document.getElementById('topUpModal').classList.remove('active');
        });
        document.getElementById('confirmTopUpBtn').addEventListener('click', () => {
            const customAmount = parseFloat(document.getElementById('customAmount').value);
            if (customAmount && customAmount > 0) topUpWallet(customAmount);
            else showToast("Please enter an amount");
        });
        
        document.querySelectorAll('.amount-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                topUpWallet(parseFloat(chip.dataset.amount));
            });
        });
        
        document.getElementById('profileIcon').addEventListener('click', () => {
            showToast(`👤 ${currentCustomer.name}\n📞 ${currentCustomer.phone}`);
        });
        document.getElementById('notifyIcon').addEventListener('click', () => {
            showToast("🔔 No new notifications");
        });
        
        setInterval(() => {
            loadData();
            renderEvents();
            if (document.querySelector('.tab.active')?.dataset.tab === 'mytickets') renderMyTickets();
            updateBalanceDisplay();
        }, 10000);
    }
    
    init();
</script>
</body>
</html>
