<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rands Cape Town - Event Tickets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
            max-width: 800px;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fbbf24, #f87171);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .toggle-wallet {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 30px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        
        .toggle-wallet:hover {
            background: #3b82f6;
        }
        
        .events-section, .wallet-section {
            width: 100%;
            max-width: 1300px;
            margin-bottom: 40px;
        }
        
        .event-card {
            background: rgba(30, 41, 59, 0.85);
            border-radius: 28px;
            margin-bottom: 40px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .event-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-bottom: 2px solid #fbbf24;
        }
        
        .event-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #fbbf24;
            margin-bottom: 8px;
        }
        
        .event-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
        }
        
        .ticket-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        
        .ticket-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        
        .ticket-header {
            padding: 20px;
            text-align: center;
        }
        
        .early-bird .ticket-header { background: linear-gradient(135deg, #0ea5e9, #3b82f6); }
        .general .ticket-header { background: linear-gradient(135deg, #10b981, #059669); }
        .vip .ticket-header { background: linear-gradient(135deg, #f59e0b, #d97706); }
        
        .ticket-type {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .ticket-price {
            font-size: 2rem;
            font-weight: 800;
            margin: 10px 0;
        }
        
        .ticket-availability {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        .ticket-body {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .feature-list {
            list-style: none;
            margin-bottom: 20px;
        }
        
        .feature-list li {
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        
        .feature-list i.fa-check-circle {
            color: #10b981;
        }
        
        .feature-list i.fa-times-circle {
            color: #6b7280;
        }
        
        .add-to-wallet-btn {
            width: 100%;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .add-to-wallet-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .add-to-wallet-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        
        .wallet-section {
            display: none;
        }
        
        .wallet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .wallet-ticket {
            background: #0f1117;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #dc2626;
        }
        
        .wallet-ticket-header {
            background: linear-gradient(135deg, #1a1c24, #0a0c12);
            padding: 15px;
            border-bottom: 1px solid #dc2626;
        }
        
        .wallet-ticket-header h4 {
            color: #dc2626;
            font-size: 1.2rem;
        }
        
        .wallet-ticket-body {
            padding: 15px;
            text-align: center;
        }
        
        .wallet-qr {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }
        
        .wallet-qr canvas {
            width: 120px;
            height: 120px;
            background: white;
            padding: 6px;
            border-radius: 16px;
        }
        
        .wallet-info {
            font-size: 0.8rem;
            margin: 8px 0;
            color: #ccc;
        }
        
        .remove-ticket {
            background: #6b7280;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 24px;
        }
        
        .footer-note {
            text-align: center;
            max-width: 800px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 60px;
            font-size: 0.8rem;
        }
        
        @media (max-width: 768px) {
            .tickets-grid { padding: 20px; gap: 15px; }
            .event-header h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Rands Cape Town</h1>
        <p class="subtitle">Select your ticket type and add to your digital wallet. Scan QR code at the entrance.</p>
    </div>
    
    <button class="toggle-wallet" id="toggleWalletBtn"><i class="fas fa-wallet"></i> Show My Tickets</button>
    
    <div id="eventsSection" class="events-section">
        <!-- Events will be injected here -->
        <div class="empty-state">Loading events...</div>
    </div>
    
    <div id="walletSection" class="wallet-section">
        <h2 style="margin-bottom: 20px;"><i class="fas fa-ticket-alt"></i> My Digital Tickets</h2>
        <div id="walletGrid" class="wallet-grid"></div>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-qrcode"></i> Each ticket has a unique QR code. Present it at the venue for scanning.<br>
        Tickets are stored in your browser. Do not clear your browsing data.
    </div>
    
    <script>
        // ========== STORAGE KEYS ==========
        const EVENTS_KEY = 'rands_events';
        const WALLET_KEY = 'wallet_tickets';
        
        // Helper functions
        function loadEvents() {
            const stored = localStorage.getItem(EVENTS_KEY);
            return stored ? JSON.parse(stored) : [];
        }
        
        function loadWallet() {
            const stored = localStorage.getItem(WALLET_KEY);
            return stored ? JSON.parse(stored) : [];
        }
        
        function saveWallet(wallet) {
            localStorage.setItem(WALLET_KEY, JSON.stringify(wallet));
        }
        
        function generateTicketId(eventId, ticketTypeKey) {
            return `TKT-${eventId}-${ticketTypeKey}-${Date.now()}-${Math.random().toString(36).substr(2, 8)}`;
        }
        
        function addToWallet(event, ticketTypeKey) {
            const ticket = event.ticketTypes[ticketTypeKey];
            const remaining = ticket.capacity - ticket.sold;
            if (remaining <= 0) {
                alert(`Sorry, ${getTicketTypeName(ticketTypeKey)} tickets are sold out.`);
                return;
            }
            
            const typeName = getTicketTypeName(ticketTypeKey);
            const ticketId = generateTicketId(event.id, ticketTypeKey);
            const walletTicket = {
                ticketId: ticketId,
                eventId: event.id,
                eventName: event.name,
                eventDate: event.date,
                eventTime: event.time,
                location: event.location,
                ticketType: typeName,
                ticketTypeKey: ticketTypeKey,
                price: ticket.price,
                addedAt: new Date().toISOString()
            };
            
            const wallet = loadWallet();
            wallet.push(walletTicket);
            saveWallet(wallet);
            
            alert(`✅ Added 1 x "${typeName}" ticket for "${event.name}" to your wallet.`);
            renderWallet();
        }
        
        function removeFromWallet(index) {
            const wallet = loadWallet();
            if (index >= 0 && index < wallet.length) {
                wallet.splice(index, 1);
                saveWallet(wallet);
                renderWallet();
            }
        }
        
        function getTicketTypeName(key) {
            const names = { earlyBird: 'Early Bird', general: 'General Admission', vip: 'VIP Experience' };
            return names[key] || key;
        }
        
        // Render all active events (status !== 'ended')
        function renderEvents() {
            const container = document.getElementById('eventsSection');
            let events = loadEvents();
            // Filter: only show active or upcoming events (not ended)
            events = events.filter(e => e.status !== 'ended');
            
            // Check URL for specific event
            const urlParams = new URLSearchParams(window.location.search);
            const eventIdParam = urlParams.get('event');
            if (eventIdParam) {
                events = events.filter(e => e.id === eventIdParam);
            }
            
            if (events.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>No Events Available</h3><p>Check back later or contact the organizer.</p></div>`;
                return;
            }
            
            container.innerHTML = events.map(event => {
                const ticketTypes = ['earlyBird', 'general', 'vip'];
                const ticketCards = ticketTypes.map(key => {
                    const t = event.ticketTypes[key];
                    const remaining = t.capacity - t.sold;
                    const soldOut = remaining <= 0;
                    const cardClass = key === 'earlyBird' ? 'early-bird' : (key === 'general' ? 'general' : 'vip');
                    
                    // Features list (static but can be customized)
                    const features = {
                        earlyBird: ['Full event access', 'Event swag bag', 'Digital handbook', 'Standard seating'],
                        general: ['All Early Bird benefits', 'Priority seating', 'Complimentary drinks (2)', 'Exclusive workshop access'],
                        vip: ['All General benefits', 'VIP Lounge access', 'Meet & greet', 'Premium swag bag']
                    };
                    
                    const featureItems = features[key].map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('');
                    
                    return `
                        <div class="ticket-card ${cardClass}">
                            <div class="ticket-header">
                                <div class="ticket-type">${getTicketTypeName(key)}</div>
                                <div class="ticket-price">R ${formatPrice(t.price)}</div>
                                <div class="ticket-availability">${t.sold} / ${t.capacity} sold • ${remaining} left</div>
                            </div>
                            <div class="ticket-body">
                                <ul class="feature-list">
                                    ${featureItems}
                                </ul>
                                <button class="add-to-wallet-btn" onclick='addToWallet(${JSON.stringify(event).replace(/'/g, "&#39;")}, "${key}")' ${soldOut ? 'disabled' : ''}>
                                    <i class="fas fa-plus-circle"></i> Add to Wallet
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                return `
                    <div class="event-card">
                        <div class="event-header">
                            <h2>${escapeHtml(event.name)}</h2>
                            <div class="event-meta">
                                <span><i class="fas fa-calendar-alt"></i> ${formatDate(event.date)} at ${event.time}</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location)}</span>
                            </div>
                        </div>
                        <div class="tickets-grid">
                            ${ticketCards}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Render wallet tickets with QR codes
        function renderWallet() {
            const wallet = loadWallet();
            const container = document.getElementById('walletGrid');
            
            if (wallet.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><h3>No Tickets Yet</h3><p>Add tickets from the events above.</p></div>`;
                return;
            }
            
            container.innerHTML = wallet.map((ticket, idx) => {
                const qrId = `qr-wallet-${idx}`;
                const qrPayload = JSON.stringify({
                    ticketId: ticket.ticketId,
                    eventName: ticket.eventName,
                    eventDate: ticket.eventDate,
                    eventTime: ticket.eventTime,
                    venue: ticket.location,
                    ticketType: ticket.ticketType,
                    price: ticket.price,
                    issued: ticket.addedAt,
                    validator: "RANDS_WALLET"
                });
                
                // Generate QR after DOM insertion
                setTimeout(() => {
                    const canvas = document.getElementById(qrId);
                    if (canvas && typeof QRCode !== 'undefined') {
                        QRCode.toCanvas(canvas, qrPayload, {
                            width: 120,
                            margin: 1,
                            color: { dark: '#dc2626', light: '#FFFFFF' }
                        }, (err) => { if (err) console.error(err); });
                    }
                }, 50);
                
                return `
                    <div class="wallet-ticket">
                        <div class="wallet-ticket-header">
                            <h4>${escapeHtml(ticket.eventName)}</h4>
                        </div>
                        <div class="wallet-ticket-body">
                            <div class="wallet-qr">
                                <canvas id="${qrId}" width="120" height="120"></canvas>
                            </div>
                            <div class="wallet-info"><strong>${escapeHtml(ticket.ticketType)}</strong> • R ${formatPrice(ticket.price)}</div>
                            <div class="wallet-info"><i class="fas fa-calendar"></i> ${formatDate(ticket.eventDate)} at ${ticket.eventTime}</div>
                            <div class="wallet-info"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(ticket.location)}</div>
                            <div class="wallet-info"><small>ID: ${ticket.ticketId.substring(0, 16)}...</small></div>
                            <button class="remove-ticket" onclick="removeFromWallet(${idx})"><i class="fas fa-trash-alt"></i> Remove</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Toggle wallet visibility
        let walletVisible = false;
        function toggleWallet() {
            const section = document.getElementById('walletSection');
            const btn = document.getElementById('toggleWalletBtn');
            walletVisible = !walletVisible;
            section.style.display = walletVisible ? 'block' : 'none';
            btn.innerHTML = walletVisible ? '<i class="fas fa-eye-slash"></i> Hide My Tickets' : '<i class="fas fa-wallet"></i> Show My Tickets';
            if (walletVisible) renderWallet();
        }
        
        // Format helpers
        function formatDate(dateString) {
            if (!dateString) return '';
            return new Date(dateString).toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
        }
        
        function formatPrice(price) {
            return price.toLocaleString('en-ZA', { minimumFractionDigits: 2 });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Listen for storage changes (if event manager updates events)
        window.addEventListener('storage', (e) => {
            if (e.key === EVENTS_KEY) {
                renderEvents();
                if (walletVisible) renderWallet();
            }
        });
        
        // Initial render
        renderEvents();
        document.getElementById('toggleWalletBtn').addEventListener('click', toggleWallet);
        
        // Expose functions for inline onclick
        window.addToWallet = addToWallet;
        window.removeFromWallet = removeFromWallet;
    </script>
</body>
</html>
